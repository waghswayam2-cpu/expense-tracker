<!DOCTYPE html>
<html>
<head>
  <title>Login - Spendwise</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2.5rem;
      justify-content: center;
    }

    .brand-diamond {
      width: 18px;
      height: 18px;
      background: #E8A020;
      transform: rotate(45deg);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 26px;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      color: #666;
      text-transform: uppercase;
      margin-top: -2rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 14px;
      padding: 2rem 2rem 1.75rem;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.3rem;
    }

    .card-desc {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:hover,
    input[type="password"]:hover {
      border-color: #484f58;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #E8A020;
      box-shadow: 0 0 0 3px rgba(232, 160, 32, 0.15);
    }

    input::placeholder {
      color: #484f58;
    }

    .submit-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 11px;
      background: #E8A020;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #0d1117;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.3px;
    }

    .submit-btn:hover {
      background: #f0b030;
      box-shadow: 0 4px 16px rgba(232, 160, 32, 0.3);
    }

    .submit-btn:active {
      transform: scale(0.98);
      background: #d09010;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.5rem 0 1.25rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #21262d;
    }

    .divider-text {
      font-size: 12px;
      color: #484f58;
    }

    .register-link {
      text-align: center;
      font-size: 13px;
      color: #8b949e;
    }

    .register-link a {
      color: #E8A020;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s, text-decoration 0.15s;
    }

    .register-link a:hover {
      color: #f0b030;
      text-decoration: underline;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 1.75rem;
    }

    .badge {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3fb950;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="brand">
    <div class="brand-diamond"></div>
    <span class="brand-name">Spendwise</span>
  </div>
  <p class="subtitle">Personal Finance Tracker</p>

  <div class="card">
    <h2 class="card-title">Welcome back</h2>
    <p class="card-desc">Sign in to your account to continue</p>

    <form method="POST">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="submit-btn">Login</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">new here?</span>
      <div class="divider-line"></div>
    </div>

    <p class="register-link">Don't have an account? <a href="/register">Register</a></p>
  </div>

  <div class="badge-row">
    <div class="badge"><div class="badge-dot"></div> Secure</div>
    <div class="badge"><div class="badge-dot"></div> Private</div>
    <div class="badge"><div class="badge-dot"></div> Always free</div>
  </div>
</div>

</body>
</html>
